name: Release

# Two ways to cut a release:
#   1. Manually (recommended): Actions tab -> "Release" -> Run workflow -> pick
#      patch / minor / major. This bumps the version in every file, tags it,
#      then builds and publishes — no local editing or tagging needed.
#   2. By tag: `git tag vX.Y.Z && git push --tags` builds and publishes that tag.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semantic version bump"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
      ref: ${{ steps.v.outputs.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute and (when manual) bump version
        id: v
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "ref=$GITHUB_REF" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CUR=$(grep -m1 '^version = ' app/src-tauri/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          IFS='.' read -r MA MI PA <<< "$CUR"
          case "${{ inputs.bump }}" in
            major) MA=$((MA+1)); MI=0; PA=0 ;;
            minor) MI=$((MI+1)); PA=0 ;;
            *)     PA=$((PA+1)) ;;
          esac
          VERSION="$MA.$MI.$PA"
          TAG="v$VERSION"
          echo "Bumping $CUR -> $VERSION"
          sed -i -E "0,/^version = \"[^\"]+\"/s//version = \"$VERSION\"/" app/src-tauri/Cargo.toml
          node -e "for (const f of ['app/src-tauri/tauri.conf.json','app/package.json','web/package.json']) { const fs=require('fs'); const j=JSON.parse(fs.readFileSync(f,'utf8')); j.version='$VERSION'; fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n'); }"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: $TAG"
          git tag "$TAG"
          git push origin "HEAD:${GITHUB_REF_NAME}" "refs/tags/$TAG"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ref=$TAG" >> "$GITHUB_OUTPUT"

  build:
    name: Build Windows installer
    needs: version
    runs-on: windows-latest

    env:
      # Optional Authenticode signing. Set these repository secrets to produce a
      # signed installer; without them the build still succeeds (unsigned).
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./app/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: ./app
        run: npm install

      - name: Fetch Wintun driver
        shell: pwsh
        run: ./scripts/fetch-wintun.ps1

      - name: Stage bundled OpenVPN client
        shell: pwsh
        run: ./scripts/fetch-openvpn.ps1

      - name: Import code-signing certificate
        if: env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          $bytes = [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $pfx = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [System.IO.File]::WriteAllBytes($pfx, $bytes)
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password
          # Inject the thumbprint so the Tauri bundler signs the installer.
          $conf = 'app/src-tauri/tauri.conf.json'
          $json = Get-Content $conf -Raw | ConvertFrom-Json
          $json.bundle.windows | Add-Member -NotePropertyName certificateThumbprint -NotePropertyValue $cert.Thumbprint -Force
          $json | ConvertTo-Json -Depth 32 | Set-Content $conf
          Remove-Item $pfx -Force

      - name: Build app & publish release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts and generates latest.json when set.
          # Generate a keypair with `npm run tauri signer generate` and store the
          # private key (and its password) as these repository secrets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: "MyVPN ${{ needs.version.outputs.tag }}"
          releaseBody: |
            ## MyVPN ${{ needs.version.outputs.tag }}

            Serverless peer-to-peer VPN. Download the Windows installer below.

            > Run the installer, then launch **MyVPN**. The app needs Administrator
            > rights to create the secure network tunnel.
          releaseDraft: false
          prerelease: false

      - name: Attach stable-named installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = Get-ChildItem app/src-tauri/target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          if (-not $exe) { throw "No NSIS installer found to attach." }
          $stable = Join-Path $exe.Directory.FullName "MyVPN-Setup-x64.exe"
          Copy-Item $exe.FullName $stable -Force
          Write-Host "Uploading $($stable) to release ${{ needs.version.outputs.tag }}"
          gh release upload ${{ needs.version.outputs.tag }} "$stable" --clobber --repo ${{ github.repository }}
